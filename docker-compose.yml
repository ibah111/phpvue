services:
  php:
    build:
      context: ./docker/php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    command: backend-start
    ports:
      - "${BACKEND_PORT:-25200}:25200"
    environment:
      APP_NAME: ${APP_NAME:-YandexReviews}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: ${APP_URL:-http://localhost:25200}
      APP_LOCALE: ${APP_LOCALE:-ru}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-yandex_reviews}
      DB_USERNAME: ${POSTGRES_USER:-yandex_reviews}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-yandex_reviews}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      AUTO_MIGRATE: "${AUTO_MIGRATE:-true}"
      AUTO_SEED: "${AUTO_SEED:-true}"
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-60}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:25300,127.0.0.1:25300,localhost:25200,127.0.0.1:25200}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:25300}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:25300}
      YANDEX_MAPS_MAX_REVIEWS: ${YANDEX_MAPS_MAX_REVIEWS:-600}
      YANDEX_MAPS_PAGE_SIZE: ${YANDEX_MAPS_PAGE_SIZE:-50}
      YANDEX_MAPS_REQUEST_DELAY_MS: ${YANDEX_MAPS_REQUEST_DELAY_MS:-250}
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yandex_reviews}
      POSTGRES_USER: ${POSTGRES_USER:-yandex_reviews}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yandex_reviews}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./docker/frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://php:25200}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost,127.0.0.1,phpvue.sborkaweb.ru}
      VITE_PORT: ${VITE_PORT:-25300}
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0 --port ${VITE_PORT:-25300}"
    ports:
      - "${FRONTEND_PORT:-25300}:${VITE_PORT:-25300}"
    depends_on:
      - php

volumes:
  postgres-data:
  frontend-node-modules:
